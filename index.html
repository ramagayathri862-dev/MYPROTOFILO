<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
    text-align:center;
}

/* Navigation */

nav{
    display:flex;
    justify-content:center;
    padding:15px;
    background:#2c3e50;
}

nav ul{
    display:flex;
    list-style:none;
    margin:0;
    padding:0;
}

nav ul li{
    padding:10px 25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
}

nav ul li a:hover{
    color:#00bfff;
}

/* Main Container */

.container{
    margin-top:50px;
    padding:40px;
    width:60%;
    margin-left:auto;
    margin-right:auto;
    background:white;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* Photo */

.photo-container{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.photo-container img{
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid #2c3e50;
    object-fit:cover;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* Text */

.container h1{
    font-size:36px;
    color:#2c3e50;
}

.container p{
    font-size:18px;
    margin-top:15px;
    color:#555;
}

/* Footer */

footer{
    background:#2c3e50;
    text-align:center;
    position:fixed;
    bottom:0;
    width:100%;
}

footer p{
    margin:0;
    padding:12px;
    color:white;
    font-size:16px;
}
