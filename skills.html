body{
    margin:0;

    text-align:center;
}

/* Navigation */

nav{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    background:#2c3e50;
}

nav ul{
    display:flex;
    list-style:none;
    margin:0;

nav li{

}

nav a{
    color:white;

}

nav a:hover{

/* Container */

.container{
    margin-top:60px;
    background:white;
    width:50%;
    margin-left:auto;
    margin-right:auto;
    padding:40px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);

/* Heading */

.container h1{
    font-size:36px;
    color:#2c3e50;
    margin-bottom:30px;
}

.skills{

    padding:15px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    margin:15px;
    transition:0.3s;
}

.skills:hover{
    background:#2c3e50;
    color:white;
    transform:scale(1.05);
    cursor:pointer;
}

/* Footer */

footer{
    background:#2c3e50;
    text-align:center;
    position:fixed;
    bottom:0;
    width:100%;
}

footer p{
    margin:0;
    padding:12px;

    font-size:16px;
